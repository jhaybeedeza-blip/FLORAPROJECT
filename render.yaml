services:
  - type: web
    name: sitenijb
    runtime: python3
    buildCommand: pip install -r requirements.txt && cd sitenijb && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn sitenijb.wsgi:application --bind 0.0.0.0 --chdir sitenijb
    envVars:
      - key: PYTHON_VERSION
        value: 3.11