services:
  - type: web
    name: sitenijb
    runtime: python3
    buildCommand: pip install -r requirements.txt && python sitenijb/manage.py migrate && python sitenijb/manage.py collectstatic --noinput
    startCommand: gunicorn sitenijb.wsgi:application --bind 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11